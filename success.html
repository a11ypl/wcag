<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamówienie wysłane - Dziękujemy! | Włącz Wizję</title>
    <style>
        :root {
            --primary: #5F28B4;
            --accent: #fa9632;
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --gray: #6c757d;
            --gray-light: #e9ecef;
            --accent-hover: #e68a1c;
            --text-on-accent: #000000;
            --focus-color: #FFD700;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background: linear-gradient(180deg, #ffffff 0%, var(--light) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        *:focus-visible {
            outline: 4px solid #FF00FF;
            outline-offset: 4px;
            box-shadow: 0 0 0 4px #CCFF00, inset 0 0 0 4px #000000;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, #4a1f8f 100%);
            color: #fff;
            padding: 1rem 0;
            box-shadow: var(--shadow-sm);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

        .header-content { display: flex; justify-content: center; align-items: center; }

        .logo { font-size: 1.5rem; font-weight: 700; }

        main {
            flex: 1;
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        .status-card {
            width: 100%;
            max-width: 760px;
            background: #fff;
            border: 2px solid var(--gray-light);
            border-top: 8px solid var(--accent);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 2.5rem;
            text-align: center;
        }

        .status-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            line-height: 1;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 0.75rem;
            line-height: 1.2;
            font-size: clamp(1.8rem, 3vw, 2.5rem);
        }

        p { margin-bottom: 1.5rem; color: #222; }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--text-on-accent);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        footer {
            background: var(--dark);
            color: #fff;
            padding: 1.5rem 2rem;
            text-align: center;
        }

        @media (max-width: 640px) {
            .container { padding: 0 1rem; }
            .status-card { padding: 1.5rem; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">Włącz Wizję</div>
        </div>
    </header>

    <main id="main-content">
        <section class="status-card" aria-live="polite">
            <div class="status-icon" aria-hidden="true">✅</div>
            <h1>Dziękujemy za wysłanie zamówienia</h1>
            <p>
                Otrzymaliśmy Twoje zgłoszenie. Dane do przelewu znajdziesz w formularzu
                na stronie kursu, a szczegóły organizacyjne wyślemy e-mailem.
            </p>
            <a href="/index.html" class="btn btn-primary">Wróć na stronę główną</a>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Włącz Wizję. Wszelkie prawa zastrzeżone.</p>
        </div>
    </footer>
</body>
</html>
