  <style>
    :root {
      --bg: #050505;
      --surface: #151515;
      --surface-hover: #5f28b4;
      --primary: #5f28b4;
      --text: #ffffff;
      --muted: #d6d6d6;
      --accent: #fa9632;
      --line: #6f6f6f;
      --focus-inner: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      padding: clamp(10px, 2vh, 20px);
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.35;
    }

    body,
    main {
      display: grid;
    }

    body {
      align-items: center;
      overflow-x: hidden;
    }

    main {
      width: min(520px, 100%);
      margin: 0 auto;
      gap: clamp(10px, 2vh, 22px);
    }

    h1,
    p,
    ul {
      margin: 0;
    }

    .skip-link {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--accent);
      color: #000000;
      font-weight: 800;
      text-decoration: none;
      transform: translateY(-140%);
    }

    .skip-link:focus-visible {
      transform: translateY(0);
      outline: 4px solid var(--focus-inner);
      outline-offset: 3px;
    }

    .logo {
      justify-self: start;
      margin: 0;
      width: 100%;
    }

    .site-banner {
      display: inline-flex;
      width: min(100%, 430px, 48vh);
      height: auto;
      align-items: center;
      justify-content: flex-start;
      border-radius: 8px;
    }

    .site-banner img {
      display: block;
      object-fit: contain;
    }

    .site-banner-full {
      display: block;
      width: 100%;
      height: auto;
    }

    .site-banner-icon {
      display: none !important;
      width: 52px;
      height: 52px;
      padding: 6px;
      border: 2px solid #ffcc00;
      border-radius: 8px;
      background: var(--primary);
    }

    body.header-compact .site-banner {
      width: 52px;
      height: 52px;
    }

    body.header-compact .site-banner-full {
      display: none !important;
    }

    body.header-compact .site-banner-icon {
      display: block !important;
    }

    body:not(.header-compact) .site-banner-full {
      display: block !important;
    }

    body:not(.header-compact) .site-banner-icon {
      display: none !important;
    }

    .site-banner:focus-visible {
      outline: 4px solid var(--accent);
      outline-offset: 6px;
      box-shadow: 0 0 0 10px var(--focus-inner);
    }

    .intro {
      max-width: 440px;
      color: var(--text);
      font-size: clamp(1.35rem, 3.2vh, 1.75rem);
      line-height: 1.2;
    }

    nav ul {
      display: grid;
      gap: clamp(6px, 1vh, 10px);
      padding: 0;
      list-style: none;
    }

    nav a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: clamp(46px, 7vh, 58px);
      padding: clamp(10px, 1.7vh, 15px) 18px;
      border: 2px solid var(--primary);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 0 0 2px rgba(95, 40, 180, 0.45);
    }

    nav a:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    nav a:focus-visible {
      background: var(--surface-hover);
      outline: 4px solid var(--accent);
      outline-offset: 4px;
      box-shadow: 0 0 0 8px var(--focus-inner);
    }

    .link-arrow {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 1.2rem;
      line-height: 1;
    }

    nav a:hover .link-arrow,
    nav a:focus-visible .link-arrow {
      color: var(--text);
    }

    footer {
      color: var(--muted);
      font-size: clamp(0.75rem, 1.6vh, 0.875rem);
    }

    @media (max-height: 760px) {
      body {
        align-items: start;
      }

      main {
        gap: 8px;
      }

      .site-banner {
        width: min(100%, 340px, 44vh);
      }

      nav a {
        min-height: 42px;
        padding-top: 8px;
        padding-bottom: 8px;
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 12px;
      }

      nav a {
        min-height: 46px;
        padding: 10px 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
